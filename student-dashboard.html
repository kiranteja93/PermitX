<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - PermitX</title>
    <link rel="stylesheet" href="assets/css/student.css">
    <style>
        /* Edit modal styles */
        .edit-modal-overlay {
            display: none;
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .edit-modal-content {
            background: white; padding: 25px; border-radius: 12px;
            width: 90%; max-width: 480px;
        }
        .edit-modal-content h3 { color: #0f9d58; margin-bottom: 15px; }
        .edit-form-group { display:flex; flex-direction:column; margin-bottom:12px; }
        .edit-form-group label { font-size:13px; font-weight:600; margin-bottom:5px; }
        .edit-form-group input,
        .edit-form-group select,
        .edit-form-group textarea {
            padding:9px; border:1px solid #ccc; border-radius:6px; font-size:14px;
        }
        .edit-btn {
            background: #3498db; color:white; border:none;
            padding:6px 10px; border-radius:5px; cursor:pointer; margin:2px;
        }
        .delete-btn {
            background: #e74c3c; color:white; border:none;
            padding:6px 10px; border-radius:5px; cursor:pointer; margin:2px;
        }
        .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:15px; }
        .btn-save   { background:#0f9d58; color:white; border:none; padding:9px 20px; border-radius:6px; cursor:pointer; }
        .btn-cancel { background:#aaa;    color:white; border:none; padding:9px 20px; border-radius:6px; cursor:pointer; }
    </style>
</head>
<body onload="initPage()">

    <header class="navbar">
        <div class="logo-area">
            <img src="assets/images/permitx-logo3.avif" class="logo-small">
            <span class="brand">PermitX</span>
        </div>
        <button onclick="logout()" class="logout-btn">Logout</button>
    </header>

    <div class="container">
        <h2>Student Dashboard</h2>

        <!-- Apply Leave -->
        <div class="card">
            <h3>Apply Leave</h3>
            <form id="leaveForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>From Date</label>
                        <input type="date" id="fromDate" required>
                    </div>
                    <div class="form-group">
                        <label>To Date</label>
                        <input type="date" id="toDate" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Session</label>
                    <select id="session">
                        <option value="FULL">FULL DAY</option>
                        <option value="FN">FORENOON</option>
                        <option value="AN">AFTERNOON</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Leave Reason</label>
                    <textarea id="content" rows="4"
                        placeholder="Write your leave letter..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Apply Leave</button>
            </form>
        </div>

        <!-- My Leaves Table -->
        <div class="card">
            <h3>My Leaves</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>From</th>
                            <th>To</th>
                            <th>Session</th>
                            <th>Status</th>
                            <!-- ✅ FEATURE 2: HOD Remarks column -->
                            <th>HOD Remarks</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="leaveTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- View Letter Modal -->
    <div id="letterModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3>Leave Letter</h3>
            <p id="letterText"></p>
        </div>
    </div>

    <!-- ✅ FEATURE 1: Edit Leave Modal -->
    <div id="editModal" class="edit-modal-overlay">
        <div class="edit-modal-content">
            <h3>✏️ Edit Leave Request</h3>
            <input type="hidden" id="editLeaveId">
            <div class="edit-form-group">
                <label>From Date</label>
                <input type="date" id="editFromDate" required>
            </div>
            <div class="edit-form-group">
                <label>To Date</label>
                <input type="date" id="editToDate" required>
            </div>
            <div class="edit-form-group">
                <label>Session</label>
                <select id="editSession">
                    <option value="FULL">FULL DAY</option>
                    <option value="FN">FORENOON</option>
                    <option value="AN">AFTERNOON</option>
                </select>
            </div>
            <div class="edit-form-group">
                <label>Leave Reason</label>
                <textarea id="editContent" rows="4"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                <button class="btn-save"   onclick="submitEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/student.js"></script>
</body>
</html>
