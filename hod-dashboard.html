<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOD Dashboard - PermitX</title>
    <link rel="stylesheet" href="assets/css/hod.css">
</head>
<body onload="initPage()">

    <header class="navbar">
        <div class="logo-area">
            <img src="assets/images/permitx-logo3.avif" class="logo-small">
            <div>
                <span class="brand">PermitX</span>
                <!-- ✅ FEATURE 5: Shows HOD's department name automatically -->
                <div id="hodDepartment" style="font-size:12px; color:#e8f5e9; margin-top:2px;"></div>
            </div>
        </div>
        <button onclick="logout()" class="logout-btn">Logout</button>
    </header>

    <div class="container">
        <h2>HOD Dashboard</h2>

        <div class="summary">
            <div class="card-box">Total    <span id="totalCount">0</span></div>
            <div class="card-box">Pending  <span id="pendingCount">0</span></div>
            <div class="card-box">Approved <span id="approvedCount">0</span></div>
            <div class="card-box">Rejected <span id="rejectedCount">0</span></div>
        </div>

        <!-- ✅ FEATURE 5: Department filter REMOVED — backend handles it automatically -->
        <div class="filters">
            <div class="filter-group">
                <label>Section</label>
                <select id="section">
                    <option value="">All Sections</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                    <option value="E">E</option>
                    <option value="F">F</option>
                    <option value="G">G</option>
                    <option value="H">H</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Status</label>
                <select id="status">
                    <option value="">ALL</option>
                    <option value="PENDING">PENDING</option>
                    <option value="APPROVED">APPROVED</option>
                    <option value="REJECTED">REJECTED</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Roll No</label>
                <input type="text" id="studentRollNo" placeholder="Search by Roll No">
            </div>

            <div class="filter-group button-group">
                <button onclick="loadLeaves(0)">Search</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>From</th>
                        <th>To</th>
                        <th>Session</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="leaveTable"></tbody>
            </table>
            <div id="pagination" style="display:flex;gap:10px;align-items:center;
                margin-top:12px;justify-content:center;"></div>
        </div>
    </div>

    <div id="letterModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3>Leave Letter</h3>
            <p id="letterText"></p>
        </div>
    </div>

    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/hod.js"></script>
</body>
</html>
