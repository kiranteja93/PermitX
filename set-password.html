<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Set Password - PermitX</title>
        <link rel="stylesheet" href="assets/css/set-password.css">
    </head>
    <body>
        <div class="auth-container">
            <div class="auth-card">
                <img src="assets/images/permitx-logo3.avif" class="logo-small">

                <h2>Create New Password</h2>
                <p class="sub-text">Please set your new secure Password</p>

                <form id="setPasswordForm">
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="newPassword" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" required>
                    </div>

                    <button type="submit" class="btn-primary">Set Password</button>
                    <p id="message" class="message-text"></p>
                </form>
            </div>

        </div>
        <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <script src="assets/js/config.js"></script>
    <script>
            function showLoader(){
                document.getElementById("loader").style.display = "flex";
            }

            function hideLoader(){
                document.getElementById("loader").style.display = "none";
            }
            document.getElementById("setPasswordForm").addEventListener("submit", async function(e)
            { e.preventDefault();

                const newPassword =
                document.getElementById("newPassword").value;
                const confirmPassword =
                document.getElementById("confirmPassword").value;

                if(newPassword !== confirmPassword){
                    document.getElementById("message").innerHTML = "Passwords do not match";

                    document.getElementById("message").style.color = "red";
                    return;
                }
  
                showLoader();
                try{
                const response = await
                fetch("http://localhost:9090/api/user/set-password",
                    {
                        method: "PUT",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": "Bearer " +
                            sessionStorage.getItem("token")
                        },
                        body: JSON.stringify({
                            newPassword: newPassword
                        })
                    }
                );
                if(response.ok){
                    document.getElementById("message").innerHTML = "Password Updated Successfully✔️";

                    document.getElementById("message").style.color = "#0f9d58";

                    localStorage.setItem("firstLogin", "false");
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 1500);
                }else{
                    document.getElementById("message").innerHTML = "Something Went Wrong🤔";

                    document.getElementById("message").style.color = "red";
                }
                } catch(error) {
                console.log(error);
                document.getElementById("message").innerHTML="Server error🚨";

                document.getElementById("message").style.color = "red";
                }finally{
                hideLoader();
                }
                
            });
        </script>
        
    </body>
</html>
