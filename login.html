<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PermitX</title>
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>PermitX Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary">Login</button>
                <p id="errorMsg" class="error-text"></p>
                <p style="text-align:center; margin-top:12px; font-size:13px;">
                    <a href="forgot-password.html" style="color:#0f9d58;">Forgot Password?</a>
                </p>
            </form>
        </div>
    </div>

    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
    </div>

    <!-- ✅ config.js loaded first — provides apiFetch, sessionStorage helpers -->
    <script src="assets/js/config.js"></script>
    <script>
        function showLoader() { document.getElementById("loader").style.display = "flex"; }
        function hideLoader() { document.getElementById("loader").style.display = "none"; }

        document.getElementById("loginForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorMsg");
            errorMsg.innerText = "";

            showLoader();
            try {
                // ✅ Uses apiFetch from config.js
                const response = await apiFetch("/api/auth/login", {
                    method: "POST",
                    body: JSON.stringify({ username, password })
                });

                if (!response || !response.ok) {
                    throw new Error("Invalid username or password");
                }

                const data = await response.json();

                // ✅ sessionStorage instead of localStorage — clears when browser closes
                sessionStorage.setItem("token", data.token);
                sessionStorage.setItem("role", data.role);
                sessionStorage.setItem("user", JSON.stringify(data.user));

                // ✅ First login redirect
                if (data.user.firstLogin) {
                    window.location.href = "set-password.html";
                    return;
                }

                // ✅ Role-based redirect
                const redirectMap = {
                    "STUDENT": "student-dashboard.html",
                    "FACULTY": "faculty.html",
                    "HOD":     "hod-dashboard.html",
                    "ADMIN":   "admin.html"
                };

                const redirect = redirectMap[data.role];
                if (redirect) {
                    window.location.href = redirect;
                } else {
                    errorMsg.innerText = "Unknown role. Contact admin.";
                }

            } catch (error) {
                errorMsg.innerText = error.message || "Login failed";
            } finally {
                hideLoader();
            }
        });
    </script>
</body>
</html>
