<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - PermitX</title>
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Forgot Password?</h2>
            <p style="text-align:center; color:#777; font-size:13px; margin-bottom:20px;">
                Enter your Roll No and registered Phone number
            </p>

            <form id="forgotForm">
                <div class="form-group">
                    <label>Roll No</label>
                    <input type="text" id="username" placeholder="e.g. 21CS001" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="e.g. 9876543210" required>
                </div>
                <button type="submit" class="btn-primary">Reset Password</button>
                <p id="message" style="margin-top:12px; font-size:13px; text-align:center;"></p>
            </form>

            <p style="text-align:center; margin-top:15px; font-size:13px;">
                <a href="login.html" style="color:#0f9d58;">← Back to Login</a>
            </p>
        </div>
    </div>

    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
    </div>

    <script src="assets/js/config.js"></script>
    <script>
        function showLoader() { document.getElementById("loader").style.display = "flex"; }
        function hideLoader() { document.getElementById("loader").style.display = "none"; }

        document.getElementById("forgotForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const phone    = document.getElementById("phone").value.trim();
            const message  = document.getElementById("message");

            message.innerText = "";

            showLoader();
            try {
                // ✅ Public endpoint — no token needed
                const response = await fetch(API_BASE + "/api/auth/forgot-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, phone })
                });

                const text = await response.text();

                if (response.ok) {
                    message.style.color = "#0f9d58";
                    message.innerText = "✔️ " + text;

                    // ✅ Redirect to login after 2.5 seconds
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 2500);
                } else {
                    message.style.color = "red";
                    message.innerText = "❌ " + text;
                }
            } catch (error) {
                message.style.color = "red";
                message.innerText = "Network error. Please try again.";
            } finally {
                hideLoader();
            }
        });
    </script>
</body>
</html>
